<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-3485001053572124">
  <title>로또 번호 추천</title>
  <link href='/style.css' rel='stylesheet'>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3485001053572124"
     crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🍀 로또 번호 추천</h1>
      <p class="subtitle">행운의 번호를 뽑아보세요!</p>
    </header>

    <section class="controls">
      <label for="set-count">추천 게임 수</label>
      <div class="count-selector">
        <button id="count-down" class="count-btn">−</button>
        <span id="set-count">5</span>
        <button id="count-up" class="count-btn">+</button>
      </div>
      <button id="generate-btn" class="generate-btn">번호 추천받기</button>
    </section>

    <section id="results" class="results"></section>

    <section class="lookup-section">
      <div class="section-title">
        <h2>🏆 당첨 번호 조회</h2>
      </div>
      <div class="lookup-controls">
        <button id="latest-btn" class="latest-btn">최신 회차 조회</button>
        <div class="round-row">
          <input type="number" id="round-input" min="1" max="9999" placeholder="회차 번호 직접 입력">
          <button id="lookup-btn" class="lookup-btn">조회</button>
        </div>
      </div>
      <div id="lookup-result" class="lookup-result"></div>
    </section>

    <section class="contact-section">
      <div class="section-title">
        <h2>🤝 제휴 문의</h2>
      </div>
      <form id="contact-form" class="contact-form">
        <div class="form-row">
          <div class="form-group">
            <label for="f-name">이름 <span class="required">*</span></label>
            <input type="text" id="f-name" name="name" placeholder="홍길동" required>
          </div>
          <div class="form-group">
            <label for="f-company">회사명</label>
            <input type="text" id="f-company" name="company" placeholder="(주)행운">
          </div>
        </div>
        <div class="form-group">
          <label for="f-email">이메일 <span class="required">*</span></label>
          <input type="email" id="f-email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="f-message">문의 내용 <span class="required">*</span></label>
          <textarea id="f-message" name="message" rows="4" placeholder="제휴 제안 내용을 자유롭게 입력해주세요." required></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">문의 보내기</button>
        <div id="form-status" class="form-status"></div>
      </form>
    </section>

    <section class="history-section">
      <div class="history-header">
        <h2>추첨 기록</h2>
        <button id="clear-history" class="clear-btn">기록 삭제</button>
      </div>
      <div id="history-list" class="history-list">
        <p class="empty-msg">아직 추첨 기록이 없습니다.</p>
      </div>
    </section>
  </div>

  <section class="disqus-section">
    <div class="section-title">
      <h2>💬 댓글</h2>
    </div>
    <div id="disqus_thread"></div>
  </section>

  <script defer type="text/javascript" src="/main.js"></script>
  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = 'lotto-main';
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://productbuilder.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
</body>
</html>
